services:
  db:
    image: mysql:8.0
    container_name: forum_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: forum_db
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: forum_app
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy